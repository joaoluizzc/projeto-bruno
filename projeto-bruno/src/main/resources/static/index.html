<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Academico</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">SA</div>
                <div>
                    <strong>Sistema Academico</strong>
                    <span>Controle docente</span>
                </div>
            </div>

            <nav>
                <a href="#professores" class="active">Professores</a>
            </nav>
        </aside>

        <main class="content" id="professores">
            <header class="page-header">
                <div>
                    <p class="eyebrow">Secretaria</p>
                    <h1>Cadastro de Professores</h1>
                </div>
                <button class="primary" id="btnAtualizar" type="button">Atualizar lista</button>
            </header>

            <section class="workspace">
                <div id="mensagem" class="message" role="status"></div>

                <div class="grid">
                    <form id="formCadastro" class="panel">
                        <h2>Novo professor</h2>
                        <label>
                            Nome
                            <input id="nomeCadastro" type="text" required placeholder="Ex.: Joao Souza">
                        </label>
                        <label>
                            Email
                            <input id="emailCadastro" type="email" required placeholder="joao@faculdade.edu">
                        </label>
                        <label>
                            Materia
                            <input id="materiaCadastro" type="text" required placeholder="Ex.: Java">
                        </label>
                        <button class="primary full" type="submit">Cadastrar</button>
                    </form>

                    <form id="formEdicao" class="panel">
                        <h2>Editar cadastro</h2>
                        <label>
                            ID
                            <div class="inline">
                                <input id="idEdicao" type="number" min="1" required placeholder="ID">
                                <button id="btnBuscarEdicao" type="button">Buscar</button>
                            </div>
                        </label>
                        <label>
                            Nome
                            <input id="nomeEdicao" type="text" required>
                        </label>
                        <label>
                            Email
                            <input id="emailEdicao" type="email" required>
                        </label>
                        <label>
                            Materia
                            <input id="materiaEdicao" type="text" required>
                        </label>
                        <button class="primary full" type="submit">Salvar alteracoes</button>
                    </form>

                    <form id="formDelete" class="panel panel-danger">
                        <h2>Remover cadastro</h2>
                        <label>
                            ID
                            <div class="inline">
                                <input id="idDelete" type="number" min="1" required placeholder="ID">
                                <button id="btnBuscarDelete" type="button">Buscar</button>
                            </div>
                        </label>
                        <div id="dadosDelete" class="delete-preview">
                            Informe um ID para localizar o professor.
                        </div>
                        <button class="danger full" id="btnExcluir" type="submit" disabled>Excluir professor</button>
                    </form>
                </div>

                <div class="table-panel">
                    <div class="table-header">
                        <h2>Professores cadastrados</h2>
                        <span id="contador">0 registros</span>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Materia</th>
                                    <th>Acoes</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaProfessores"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
